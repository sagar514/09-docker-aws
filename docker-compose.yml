version: "3.8"

services:
  backend:
    build: 
      context: ./Backend
    container_name: backend
    ports: 
      - "5000:5000"
    restart: always

  frontend:
    build: 
      context: ./Frontend
      args:
        VITE_APP_URL: /
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always