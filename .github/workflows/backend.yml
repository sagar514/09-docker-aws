name: EC2 Deployment

on:
  push:
    branches:
      - master
    paths:
      - "Backend/**"
      - ".github/workflows/backend.yml"

jobs:
  deploy-to-ec2:
    
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/projects/09-docker-aws

            git pull origin master

            cd Backend
            npm ci
            npx pm2 reload all
